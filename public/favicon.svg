<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Anel externo do pomodoro/foco -->
  <circle cx="32" cy="30" r="18" fill="none" stroke="url(#ring)" stroke-width="3" stroke-linecap="round"
    stroke-dasharray="85 28" stroke-dashoffset="0" opacity="0.9"/>

  <!-- Anel interno -->
  <circle cx="32" cy="30" r="12" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>

  <!-- Raio central — símbolo de foco -->
  <circle cx="32" cy="30" r="4.5" fill="white" opacity="0.95"/>

  <!-- Três pontos representando flashcards/sequência -->
  <circle cx="20" cy="52" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="32" cy="52" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="44" cy="52" r="2.5" fill="white" opacity="0.3"/>
</svg>
